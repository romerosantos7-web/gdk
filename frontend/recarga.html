<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDK · Recarregar Saldo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos específicos da recarga */
        .recarga-container {
            max-width: 700px;
            margin: 2rem auto;
            padding: 2rem;
            background: #111;
            border: 1px solid #333;
            border-radius: 40px;
        }
        .etapas {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            color: #aaa;
        }
        .etapa {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #1a1a1a;
            border-radius: 30px;
        }
        .etapa.ativa {
            background: #fff;
            color: #000;
        }
        .saldo-cards {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .saldo-card {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 1.5rem;
            text-align: center;
        }
        .saldo-card .valor {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
        }
        .saldo-card.destaque .valor {
            color: #00cc88;
        }
        #etapa2, #etapa3 {
            display: none;
        }
        #etapa2.visivel, #etapa3.visivel {
            display: block;
        }
        .slider {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 10px;
        }
        .botoes-rapidos {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .btn-valor-rapido {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 0.8rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .btn-valor-rapido.selecionado {
            background: #fff;
            color: #000;
        }
        .btn-continuar, .btn-confirmar {
            width: 100%;
            padding: 1.2rem;
            border-radius: 60px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .btn-continuar {
            background: #fff;
            color: #000;
        }
        .btn-confirmar {
            background: #00cc88;
            color: #000;
        }
        .btn-voltar {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 0.8rem;
            border-radius: 40px;
            margin-top: 1rem;
            width: 100%;
            cursor: pointer;
        }
        .qr-code-img {
            width: 250px;
            height: 250px;
            border-radius: 20px;
            margin-bottom: 1rem;
        }
        .pix-code {
            background: #222;
            padding: 1rem;
            border-radius: 30px;
            word-break: break-all;
        }
        .aviso {
            background: rgba(255,0,0,0.1);
            border: 1px solid #ff4444;
            border-radius: 30px;
            padding: 1rem;
            margin: 1rem 0;
            color: #ff8888;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .loading-overlay.ativo {
            display: flex;
        }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 600px) {
            .saldo-cards { flex-direction: column; }
            .botoes-rapidos { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <header class="header"><!-- seu header padrão --></header>
    <main>
        <div class="recarga-container">
            <h1 class="recarga-header">Recarregar Saldo</h1>
            <div class="etapas">
                <div class="etapa ativa" id="etapa-ind1"><i class="fas fa-check-circle"></i> 1. Valor</div>
                <span>→</span>
                <div class="etapa" id="etapa-ind2">2. Pagamento</div>
                <span>→</span>
                <div class="etapa" id="etapa-ind3">3. QR Code</div>
            </div>
            <div class="saldo-cards">
                <div class="saldo-card">
                    <h3>Saldo Atual</h3>
                    <div class="valor" id="saldo-atual">R$ 0,00</div>
                </div>
                <div class="saldo-card destaque">
                    <h3>Saldo Após Recarga</h3>
                    <div class="valor" id="saldo-apos">R$ 0,00</div>
                    <div id="info-bonus"></div>
                </div>
            </div>
            <!-- Etapa 1: escolha do valor -->
            <div id="etapa1">
                <div style="background:#1a1a1a; padding:1rem; border-radius:30px; margin-bottom:1rem;">
                    <span>Valor selecionado: <strong id="valor-exibido">R$ 108,00</strong></span>
                    <span id="bonus-exibido">(bônus 10%)</span>
                </div>
                <input type="range" id="valor-slider" class="slider" min="20" max="200" value="108" step="1">
                <div class="botoes-rapidos">
                    <button class="btn-valor-rapido" data-valor="20">20</button>
                    <button class="btn-valor-rapido" data-valor="50">50</button>
                    <button class="btn-valor-rapido" data-valor="100">100</button>
                    <button class="btn-valor-rapido" data-valor="150">150</button>
                    <button class="btn-valor-rapido" data-valor="200">200</button>
                </div>
                <button class="btn-continuar" id="btn-continuar">Continuar</button>
            </div>
            <!-- Etapa 2: confirmar método -->
            <div id="etapa2">
                <div style="background:#1a1a1a; padding:1.5rem; border-radius:30px; text-align:center;">
                    <p>Valor: <strong id="valor-confirmacao">R$ 108,00</strong></p>
                    <p>+10% bônus</p>
                </div>
                <button class="btn-confirmar" id="btn-confirmar-pix">Confirmar PIX</button>
                <button class="btn-voltar" id="btn-voltar-etapa1">Voltar</button>
            </div>
            <!-- Etapa 3: QR Code -->
            <div id="etapa3">
                <div id="qr-container" style="text-align:center;"></div>
                <button class="btn-voltar" id="btn-fechar-qr">Fechar</button>
            </div>
        </div>
    </main>
    <footer class="footer"><!-- seu footer padrão --></footer>
    <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
    <script src="scripts/script.js"></script>
    <script src="scripts/recarga.js"></script>
</body>
</html>
